version: "3.9"

services:
  postgres:
    image: postgres:17-alpine
    container_name: aigen-postgres
    environment:
      POSTGRES_USER: aigen
      POSTGRES_PASSWORD: aigen2026
      POSTGRES_DB: aigen
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: aigen-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
